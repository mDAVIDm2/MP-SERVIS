name: autohub_business
description: "MP-Servis Business — приложение для СТО и частных мастеров"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.2

  # Local storage
  shared_preferences: ^2.3.4

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.7
  pdf: ^3.11.1
  printing: ^5.13.3
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  linked_scroll_controller: ^0.2.0

  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
